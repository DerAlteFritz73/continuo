doctrine:
    dbal:
        # Primary connection (writes)
        default_connection: default
        connections:
            default:
                url: '%env(resolve:DATABASE_URL)%'
                profiling_collect_backtrace: false
                use_savepoints: true
                # Connection pooling: reuse connections instead of creating new ones
                # When using PgBouncer or MariaDB proxy, enable connection pooling
                # max_lifetime: 600  # Max seconds before connection recycled
                # initial_pool_size: 5
            # Read replica configuration (optional)
            # To enable read replicas:
            # 1. Set up read-only replica database server
            # 2. Uncomment replica connection below
            # 3. Configure QueryBuilder to use replica for SELECT queries
            # replica:
            #     url: 'mysql://user:pass@replica-host:3306/continuo'
            #     profiling_collect_backtrace: false
            #     use_savepoints: true
            #     readonly: true

        # IMPORTANT: You MUST configure your server version,
        # either here or in the DATABASE_URL env var (see .env file)
        #server_version: '16'
    orm:
        auto_generate_proxy_classes: true
        enable_lazy_ghost_objects: true
        report_fields_where_declared: true
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        auto_mapping: true
        mappings:
            App:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Entity'
                prefix: 'App\Entity'
                alias: App
        dql:
            string_functions:
                REGEXP: App\Doctrine\RegexpFunction
                MATCH_AGAINST: App\Doctrine\MatchAgainstFunction
            numeric_functions:
                YEAR_EXTRACT: App\Doctrine\YearExtractFunction
        controller_resolver:
            auto_mapping: false

when@test:
    doctrine:
        dbal:
            # "TEST_TOKEN" is typically set by ParaTest
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            auto_generate_proxy_classes: false
            proxy_dir: '%kernel.build_dir%/doctrine/orm/Proxies'
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
