services:
  app:
    build:
      context: .
      target: production   # still build the full image locally
    environment:
      APP_ENV: dev
      APP_SECRET: continuo_dev_secret
      DATABASE_URL: "mysql://continuo:continuo@db:3306/continuo?serverVersion=10.11.0-MariaDB&charset=utf8mb4"
    volumes:
      - .:/var/www/continuo                      # live source mount
      - /var/www/continuo/vendor                 # keep vendor from image
      - /var/www/continuo/public/build           # keep built assets from image
      - ./docker/nginx/pma.htpasswd:/etc/nginx/pma.htpasswd:ro   # basic auth for /pma/ (gitignored)
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: continuo
      MARIADB_USER: continuo
      MARIADB_PASSWORD: continuo
    # port 3306 not exposed to host (host MariaDB already uses it)
    expose:
      - "3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    environment:
      PMA_HOST: db
      # No PMA_USER/PMA_PASSWORD on purpose: that auto-logged every visitor in
      # as MariaDB root. Log in with DB credentials instead. The control user
      # below is only for phpMyAdmin's own config storage (pmadb).
      PMA_ABSOLUTE_URI: https://continuo.kreilos.fr/pma/
      PMA_CONTROLHOST: db
      PMA_CONTROLUSER: root
      PMA_CONTROLPASS: root
      PMA_PMADB: phpmyadmin
    ports:
      - "127.0.0.1:8084:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
