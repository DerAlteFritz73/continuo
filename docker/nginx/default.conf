server {
    listen 80;
    server_name _;
    client_max_body_size 10m;

    root /var/www/continuo/public;
    index index.php;

    # Versioned assets — cache aggressively
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        # Symfony front-controller: only index.php is public
        internal;
    }

    # Deny access to any other .php files
    location ~ \.php$ {
        return 404;
    }

    # phpMyAdmin proxy — ^~ prevents the \.php$ regex from intercepting /pma/index.php
    location ^~ /pma/ {
        # Resolve phpmyadmin at request time so nginx can start even if that service is down.
        resolver           127.0.0.11 valid=30s ipv6=off;
        set                $pma_upstream http://phpmyadmin:80;
        proxy_pass         $pma_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    gzip on;
    gzip_types text/css application/javascript application/json text/plain text/xml;
    gzip_min_length 1024;

    error_log  /dev/stderr warn;
    access_log /dev/stdout;
}
