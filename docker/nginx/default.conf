server {
    listen 80;
    server_name _;
    client_max_body_size 10m;

    root /var/www/continuo/public;
    index index.php;

    # Versioned assets (build/ directory) — cache aggressively (1 year)
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    # Static assets (fonts, images) — cache for 30 days
    location ~* ^/(fonts|images)/(.+)\.(woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    # API responses — no cache by default, but allow client-side caching
    location ~ ^/api/ {
        add_header Cache-Control "public, max-age=3600";
        add_header Vary "Accept-Encoding";
        try_files $uri /index.php$is_args$args;
    }

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        # Symfony front-controller: only index.php is public
        internal;
        fastcgi_read_timeout 600s;
        fastcgi_send_timeout 600s;
        fastcgi_connect_timeout 60s;
    }

    # Deny access to any other .php files
    location ~ \.php$ {
        return 404;
    }

    # phpMyAdmin proxy — ^~ prevents the \.php$ regex from intercepting /pma/index.php
    location ^~ /pma/ {
        # Resolve phpmyadmin at request time so nginx can start even if that service is down.
        resolver           127.0.0.11 valid=30s ipv6=off;
        set                $pma_upstream http://phpmyadmin:80;
        proxy_pass         $pma_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    # Compression: gzip + brotli for ~60-80% reduction on text assets
    gzip on;
    gzip_comp_level 6;
    gzip_vary on;
    gzip_types text/css text/plain text/xml text/javascript application/javascript application/json application/xml+rss application/rss+xml application/atom+xml image/svg+xml;
    gzip_min_length 1024;
    gzip_disable "msie6";

    # Brotli compression (if available) — even better than gzip
    brotli on;
    brotli_comp_level 6;
    brotli_types text/css text/plain text/xml text/javascript application/javascript application/json application/xml+rss application/rss+xml application/atom+xml image/svg+xml;

    error_log  /dev/stderr warn;
    access_log /dev/stdout;
}
