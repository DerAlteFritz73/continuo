# ── App-wide UI ─────────────────────────────────────────────────────────────
app:
    subtitle: "Technologie musicale baroque"
    title: "Assistant de basse continue"
    desc: >
        Téléversez un fichier MusicXML contenant une ligne de basse pour générer
        une réalisation de continuo historiquement informée, basée sur les règles de
        St. Lambert (1707), Dandrieu (1719), Heinichen (1728) et l'arbre de décision
        de Wead & Knopke (ICMC 2007).
    lang_switch: "English"

