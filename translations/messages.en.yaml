app:
    subtitle: "Baroque Music Technology"
    title: "Basso Continuo Realizer"
    desc: >
        Upload a MusicXML file containing a bass line to generate an
        historically-informed continuo realization using rules from
        Gasparini (1729), Delair (1724), and the Wead–Knopke decision tree (ICMC 2007).
    lang_switch: "Français"

