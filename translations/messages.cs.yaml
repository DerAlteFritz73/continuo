# ── Decision-tree rule tests, names, sources, reasons ────────────────────────
rule:
    test:
        degree_7: "Stupeň = 7 (citlivý tón)?"
        major_mode: "Modus = dur?"
        next_step_up_resolves: "Příští pohyb = vzestupný krok (rozvedení k tónice)?"
        motion_passing_step: "Postupný pohyb dovnitř i ven (průchodný tón)?"
        degree_4_step_up: "Stupeň = 4 se vzestupným krokem dovnitř i ven (průchodný kontext)?"
        degree_4_next_step_up: "Stupeň = 4 s následujícím vzestupným pohybem (IV → V)?"
        degree_2: "Stupeň = 2 (supertónika)?"
        motion_step_down: "Pohyb = sestupný krok?"
        degree_3: "Stupeň = 3 (mediante)?"
        degree_6: "Stupeň = 6 (submediant)?"
        motion_step_up: "Pohyb = vzestupný krok?"
        degree_5: "Stupeň = 5 (dominanta)?"
        next_step_down_tonic: "Příští pohyb = sestupný krok (k tónice)?"
        next_step_down: "Příští pohyb = sestupný krok (k tónice)?"
        degree_1: "Stupeň = 1 (tónika)?"
        degree_4: "Stupeň = 4 (subdominanta)?"
        leap_fourth: "Skok kvarty (kadenciální pohyb)?"
        next_step_to_i_or_iii: "Příští pohyb = krok ke stupni I nebo III (kontext petit accord)?"
        degree_4_next_step_down: "Stupeň = 4 s následujícím sestupným pohybem (IV → III)?"
        default: "Výchozí pravidlo (žádná specifická shoda)?"

    leading_tone:
        name: "Pravidlo citlivého tónu (V⁶₅)"
        source: "Dandrieu [1719]; Christensen 2002, 17"
        reason: >
            V dur citlivý tón (7. stupeň) rozváděný k tónice bere akord zmenšené kvinty
            (♭5 s implikovanou sextou a tercií = V⁶₅). Podle Christensena §4:
            „Tento akord se skládá ze zmenšené kvinty, sexty a tercie. Obvykle se hraje
            na sedmém stupni – citlivém tónu –, za předpokladu, že postupuje k tónice (VII–I)."
            V jiných kontextech se použije jednoduchý sextakord (V⁶).

    leading_tone_no_resolve:
        reason: >
            7. stupeň v moll je přirozený subtón (♭VII), nikoliv citlivý tón.
            Tvoří durový trojzvuk v základní poloze, což je standardní harmonizace
            přirozeného sedmého stupně v mollové tónině.

    ascending_passing:
        name: "Vzestupný průchodný sextakord"
        source: "Lambert [1707]; Christensen 2002, 42"
        reason: >
            Když je 4. stupeň obklopován vzestupnými kroky (III → IV → V), působí jako
            vzestupný průchodný tón a bere sextovou číslici (první obrácení). Podle
            St. Lamberta: „Kdykoli bas postupuje po krocích, stačí harmonizovat noty
            na hlavních dobách taktu a noty mezi nimi považovat za průchodné."

    petit_accord_supertonic:
        name: "Malá sexta na 2. stupni (6/4/3)"
        source: "Dandrieu [1719]; Christensen 2002, 14–15"
        reason: >
            2. stupeň postupující krokem k tónice (I) nebo k mediantě (III) bere malou
            sextu (6/4/3) — druhé obrácení dominantního septakordu. Podle Christensena:
            „Akord ⁶₄₃ se vždy hraje, když sexta nastane na druhém stupni a vede k I nebo III."

    subdominant_65:
        name: "Subdominantní pravidlo sexta-kvinta (IV → V)"
        source: "Dandrieu [1719]; Christensen 2002, 21"
        reason: >
            4. stupeň následovaný vzestupným krokem k dominantě bere akord sexta-kvinta (6/5).
            Podle Dandrieua: „Tento akord se obvykle hraje na čtvrtém stupni, subdominantě,
            je-li následována dominantou."

    supertonic_first_inv:
        name: "První obrácení supertóniky"
        source: "Christensen 2002, 13"
        reason: >
            2. stupeň v jiných kontextech bere sextovou číslici (první obrácení) podle
            obecného francouzského pravidla pro supertóniku.

    mediant_first_inv:
        name: "Mediante jako průchodný sextakord"
        source: "Lambert [1707]; Christensen 2002, 42"
        reason: >
            3. stupeň bere sextovou číslici (první obrácení), když působí jako vzestupný
            průchodný tón procházející krokem. Podle St. Lamberta: „Kdykoli bas postupuje
            po krocích, stačí harmonizovat noty na hlavních dobách taktu."

    mediant_root:
        reason: >
            3. stupeň se zde objevuje skokem nebo jako strukturální nota. V tomto kontextu
            podporuje základní polohu (5): v moll basová mediante často představuje dominantní
            nebo mediantní trojzvuk v základní poloze.

    ascending_submediant:
        name: "Vzestupný submediant"
        source: "Christensen 2002, 10"
        reason: >
            6. stupeň stoupající krokem bere základní polohu (5), čímž tvoří submediantní
            trojzvuk (vi). To poskytuje harmonickou stabilitu před dalším vzestupem basu.

    descending_submediant:
        name: "Sestupný submediant"
        source: "Dandrieu [1719]; Christensen 2002, 13"
        reason: >
            6. stupeň klesající krokem bere sextovou číslici (IV⁶ v dur). Podle Dandrieua:
            „Obvykle se hraje na třetím stupni stupnice." První obrácení zabraňuje
            harmonickému konfliktu a udržuje plynulé vedení hlasů.

    submediant_root_major:
        name: "Submediant v základní poloze (vi)"
        source: "Christensen 2002, 10"
        reason: >
            6. stupeň se skokem nebo opakovanou notou bere v dur základní polohu,
            čímž tvoří submediantní trojzvuk (vi).

    submediant_first_inv_minor:
        name: "Submediant v prvním obrácení (moll)"
        source: "Christensen 2002, 10"
        reason: >
            6. stupeň se skokem nebo opakovanou notou bere v moll sextovou číslici
            (první obrácení), protože mollový submediantní akord přirozeně stojí
            v prvním obrácení.

    dominant_seventh:
        name: "Dominantní septakord (V⁷)"
        source: "Rameau [1722], II.5; Christensen 2002, 28"
        reason: >
            Když 5. stupeň následuje sestupný krok, bere septimovou číslici (V⁷).
            Podle Rameaua: „La dominante qui précède la tonique par degrés descendants
            reçoit la septième." Dominantní septakord zesiluje harmonickou přitažlivost k tónice.

    dominant_root:
        name: "Dominanta v základní poloze (V)"
        source: "Christensen 2002, 28"
        reason: >
            5. stupeň bez následujícího sestupného kroku bere základní polohu, čímž tvoří
            dominantní trojzvuk (V). Úplný septakord není nutný bez silného rozváděcího pohybu.

    tonic_root:
        name: "Tónika v základní poloze (I)"
        source: "Christensen 2002, 10"
        reason: >
            1. stupeň (tónika) vždy bere základní polohu, čímž tvoří tonický trojzvuk (I).
            Tónická nota v basu představuje domácí akord v nejstabilnější formě.

    cadential_64:
        name: "Kadenciální kvartasextakord (6/4)"
        source: "Heinichen [1728]; Christensen 2002, 72"
        reason: >
            Skok kvarty na 4. stupeň naznačuje kadenciální akord 6/4 (druhé obrácení).
            Podle Heinichena: „Akordy 6/4 a 5/4 se nejčastěji vyskytují v kadencích; mají
            se hrát v kadencích i bez výslovného uvedení v číslicích basu."

    subdominant_root:
        name: "Subdominanta v základní poloze (IV)"
        source: "Christensen 2002, 10"
        reason: >
            4. stupeň bere ve většině kontextů základní polohu, čímž tvoří subdominantní
            trojzvuk (IV). Bez specifického pohybového vzoru je základní poloha přirozená
            harmonizace.

    tritone_chord_iv:
        name: "Tritonový akord na IV (V⁴₂)"
        source: "Christensen 2002, 24"
        reason: >
            4. stupeň (subdominanta) následovaný sestupným krokem k mediantě (III) bere
            tritonový akord (♯4), který se rozšiřuje na ♯4/6/2 — třetí obrácení dominantního
            septakordu (V⁴₂). Podle Christensena §8: „Obvykle se hraje na čtvrtém stupni,
            je-li následován mediantou (III)."

    default_rule:
        name: "Výchozí pravidlo (základní poloha)"
        source: "Wead & Knopke, ICMC 2007"
        reason: >
            Žádné specifické pravidlo se neshodovalo s touto basovou notou. Výchozí
            harmonizace je základní poloha (5) — nejneutrálnější a nejstabilnější
            harmonizace podle záložního pravidla rozhodovacího stromu Wead & Knopke.

# ── How It Works accordion ───────────────────────────────────────────────────
how_it_works:
    heading: "Jak to funguje"
    algo_heading: "Přehled algoritmu"
    algo_intro: >
        Realizátor implementuje rozhodovací strom popsaný Wead & Knopke (ICMC 2007)
        a vychází ze dvou hlavních barokních traktátů:
    algo_gasparini: "L'Armonico Pratico al Cimbalo (3. vyd., 1729, Benátky)"
    algo_delair: "Traité d'Accompagnement pour le Théorbe et le Clavecin (1724, Paříž)"
    pipeline_heading: "Zpracovací pipeline"
    step1: "Analýza — MusicXML je načteno; nejnižší hlasová část je vybrána jako basová linka."
    step2: >
        Detekce cifrovaného basu — Jsou-li přítomny elementy <figured-bass>, jsou použity
        přímo. V opačném případě běží rozhodovací strom pro nečíslovaný bas.
    step3: "Rozhodovací strom — Vypočítá stupeň (1–7) a melodický pohyb (krok/skok, nahoru/dolů), pak vybere číslice podle Gaspariniho/Delaira:"
    step3_a: "Stupeň 7 (citlivý tón) → 6 (V⁶)"
    step3_b: "Stupně 2, 3 → 6 (první obrácení)"
    step3_c: "Stupeň 5 k tónice krokem → 7 (V⁷)"
    step3_d: "Vzestupný krok na stupni 4 → 6 (průchodný)"
    step3_e: "Vše ostatní → 5 (základní poloha)"
    step4: "Rozšíření číslic — Zkrácené číslice jsou rozšířeny: 6→6, 7→7 5, 6 5→6 5, 4 3→4 3, 2→4 2."
    step5: "Realizace hlasů — Tři horní hlasy (soprán, alt, tenor) jsou zvoleny tak, aby minimalizovaly celkový pohyb hlasů (zákon nejkratší cesty) při dodržení:"
    step5_a: "Žádné paralelní kvinty ani oktávy"
    step5_b: "Žádné křížení hlasů ani zdvojení citlivého tónu"
    step5_c: "Rozsahy hlasů: soprán c′–g″, alt g–c″, tenor c–e′"
    step6: "Export — Výstup je dvoudílný MusicXML: díl 1 = originální bas, díl 2 = realizace (horní hlasy 1–3 + bas)."
    fb_heading: "Přehled notace cifrovaného basu"
    fb_sec_triads: "Trojzvuky"
    fb_sec_sevenths: "Septakordy"
    fb_sec_ninths: "Nonakordy"
    fb_sec_suspensions: "Průtahy"
    fb_sec_chromatic: "Chromatické / Alterované"
    fb_sec_special: "Zvláštní"
    fb_none: "základní trojzvuk"
    fb_6: "sextakord (první obrácení)"
    fb_64: "kvartasextakord (druhé obrácení) — kadenciální nebo průchodný"
    fb_7: "septakord, základní poloha"
    fb_65: "septakord, první obrácení (varianta V⁶₅)"
    fb_b5: "akord zmenšené kvinty = V⁶₅ (první obrácení dominantního septakordu)"
    fb_43: "septakord, druhé obrácení / průtah 4–3"
    fb_2: "septakord, třetí obrácení"
    fb_sharp4: "tritonový akord = V⁴₂ (třetí obrácení dominantního septakordu)"
    fb_9: "nonakord / průtah 9–8"
    fb_97: "nóna se septimou"
    fb_76: "průtah 7–6"
