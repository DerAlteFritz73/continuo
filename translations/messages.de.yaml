# ── App-wide UI ─────────────────────────────────────────────────────────────
app:
    subtitle: "Barocke Musikwerkzeuge"
    title: "Generalbass-Begleitung"
    desc: >
        Laden Sie eine MusicXML-Datei mit einer Basslinie hoch, um eine historisch
        informierte Continuo-Realisation zu erzeugen, basierend auf Gasparini (1729),
        Delair (1724) und dem Entscheidungsbaum von Wead & Knopke (ICMC 2007).

