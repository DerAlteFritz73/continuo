# ── Decision-tree rule tests, names, sources, reasons ────────────────────────
rule:
    test:
        degree_7: "Stufe = 7 (Leitton)?"
        major_mode: "Tongeschlecht = Dur?"
        next_step_up_resolves: "Nächste Bewegung = aufsteigender Schritt (Auflösung zur Tonika)?"
        motion_passing_step: "Schrittweise Bewegung ein- und ausgehend (Durchgangston)?"
        degree_4_step_up: "Stufe = 4 mit aufsteigendem Schritt ein- und ausgehend (Durchgangskontext)?"
        degree_4_next_step_up: "Stufe = 4 mit folgender Aufwärtsbewegung (IV → V)?"
        degree_2: "Stufe = 2 (Supraton)?"
        motion_step_down: "Bewegung = absteigender Schritt?"
        degree_3: "Stufe = 3 (Mediante)?"
        degree_6: "Stufe = 6 (Submediant)?"
        motion_step_up: "Bewegung = aufsteigender Schritt?"
        degree_5: "Stufe = 5 (Dominante)?"
        next_step_down_tonic: "Nächste Bewegung = absteigender Schritt (zur Tonika)?"
        next_step_down: "Nächste Bewegung = absteigender Schritt (zur Tonika)?"
        degree_1: "Stufe = 1 (Tonika)?"
        degree_4: "Stufe = 4 (Subdominante)?"
        leap_fourth: "Quartsprung (Kadenzbewegung)?"
        next_step_to_i_or_iii: "Nächste Bewegung = Schritt zu Stufe I oder III (Petite-Accord-Kontext)?"
        degree_4_next_step_down: "Stufe = 4 mit folgender Abwärtsbewegung (IV → III)?"
        default: "Standardregel (keine spezifische Übereinstimmung)?"

    leading_tone:
        name: "Leittonregel (V⁶₅)"
        source: "Dandrieu [1719]; Christensen 2002, 17"
        reason: >
            In Dur löst der Leitton (7. Stufe) zur Tonika hin mit dem Akkord der verminderten
            Quinte auf (♭5 mit implizierter Sexte und Terz = V⁶₅). Nach Christensen §4:
            „Dieser Akkord besteht aus der verminderten Quinte, der Sexte und der Terz. Er wird
            üblicherweise auf der siebten Stufe gespielt – dem Leitton –, sofern er zur Tonika
            aufsteigt (VII–I)." In anderen Kontexten wird ein einfacher Sextakkord (V⁶) verwendet.

    leading_tone_no_resolve:
        reason: >
            Die 7. Stufe in Moll ist der natürliche Subton (♭VII), kein Leitton.
            Sie bildet einen Durdreiklang in Grundstellung, was die Standardharmonisierung
            für den natürlichen siebten Grad im Molltongeschlecht ist.

    ascending_passing:
        name: "Aufsteigender Durchgangssextakkord"
        source: "Lambert [1707]; Christensen 2002, 42"
        reason: >
            Wird die 4. Stufe auf- und abgehend durch Schritt berührt (III → IV → V),
            wirkt sie als aufsteigender Durchgangston und erhält die Sextzahl (erste Umkehrung).
            Nach St. Lambert: „Wann immer der Bass in Schritten geht, genügt es, die Noten auf
            den Hauptzeiten zu harmonisieren und die Zwischennoten als Durchgangstöne zu behandeln."

    petit_accord_supertonic:
        name: "Kleine Sexte auf der 2. Stufe (6/4/3)"
        source: "Dandrieu [1719]; Christensen 2002, 14–15"
        reason: >
            Die 2. Stufe, schrittweise zur Tonika (I) oder Mediante (III) führend, erhält die
            kleine Sexte (6/4/3) — zweite Umkehrung des Dominantseptakkords. Nach Christensen:
            „Der ⁶₄₃-Akkord wird stets gespielt, wenn die Sexte auf der zweiten Stufe erscheint
            und zu I oder III führt."

    subdominant_65:
        name: "Subdominante Sexte-Quinte-Regel (IV → V)"
        source: "Dandrieu [1719]; Christensen 2002, 21"
        reason: >
            Die 4. Stufe, von einem aufsteigenden Schritt zur Dominante gefolgt, erhält den
            Sexte-Quinte-Akkord (6/5). Nach Dandrieu: „Dieser Akkord wird üblicherweise auf
            der vierten Stufe gespielt, wenn sie von der Dominante gefolgt wird."

    supertonic_first_inv:
        name: "Erste Umkehrung der 2. Stufe"
        source: "Christensen 2002, 13"
        reason: >
            Die 2. Stufe in anderen Kontexten erhält die Sextzahl (erste Umkehrung), gemäß
            der allgemeinen französischen Regel für den Supraton.

    mediant_first_inv:
        name: "Mediante als Durchgangssextakkord"
        source: "Lambert [1707]; Christensen 2002, 42"
        reason: >
            Die 3. Stufe erhält die Sextzahl (erste Umkehrung), wenn sie als aufsteigender
            Durchgangston schrittweise berührt wird. Nach St. Lambert: „Wann immer der Bass
            in Schritten geht, genügt es, die Noten auf den Hauptzeiten zu harmonisieren."

    mediant_root:
        reason: >
            Die 3. Stufe erscheint hier durch Sprung oder als struktureller Ton, nicht als
            aufsteigender Durchgangston. In diesem Kontext unterstützt sie die Grundstellung:
            In Moll repräsentiert der Mediante-Bass oft den Dominant- oder Mediantdreiklang.

    ascending_submediant:
        name: "Aufsteigender Submediant"
        source: "Christensen 2002, 10"
        reason: >
            Die 6. Stufe, aufsteigend durch Schritt, erhält die Grundstellung (5), womit der
            Submediantdreiklang (vi) gebildet wird. Dies sichert harmonische Stabilität vor dem
            weiteren Aufstieg des Basses.

    descending_submediant:
        name: "Absteigender Submediant"
        source: "Dandrieu [1719]; Christensen 2002, 13"
        reason: >
            Die 6. Stufe, absteigend durch Schritt, erhält die Sextzahl (IV⁶ in Dur). Nach
            Dandrieu: „Er wird üblicherweise auf der dritten Stufe gespielt." Die erste Umkehrung
            vermeidet harmonische Konflikte und erhält eine glatte Stimmführung.

    submediant_root_major:
        name: "Submediant in Grundstellung (vi)"
        source: "Christensen 2002, 10"
        reason: >
            Die 6. Stufe mit Sprung oder wiederholtem Ton erhält in Dur die Grundstellung,
            womit der Submediantdreiklang (vi) gebildet wird.

    submediant_first_inv_minor:
        name: "Submediant in erster Umkehrung (Moll)"
        source: "Christensen 2002, 10"
        reason: >
            Die 6. Stufe mit Sprung oder wiederholtem Ton erhält in Moll die Sextzahl (erste
            Umkehrung), da der Mollsubmediant natürlicherweise in erster Umkehrung steht.

    dominant_seventh:
        name: "Dominantseptakkord (V⁷)"
        source: "Rameau [1722], II.5; Christensen 2002, 28"
        reason: >
            Wird die 5. Stufe von einem absteigenden Schritt gefolgt, erhält sie die Septimzahl
            (V⁷). Nach Rameau: „La dominante qui précède la tonique par degrés descendants reçoit
            la septième." Der Dominantseptakkord verstärkt die harmonische Anziehung zur Tonika.

    dominant_root:
        name: "Dominante in Grundstellung (V)"
        source: "Christensen 2002, 28"
        reason: >
            Die 5. Stufe ohne folgenden absteigenden Schritt erhält die Grundstellung,
            womit der Dominantdreiklang (V) gebildet wird. Der vollständige Septakkord ist
            ohne starke Auflösungsbewegung nicht erforderlich.

    tonic_root:
        name: "Tonika in Grundstellung (I)"
        source: "Christensen 2002, 10"
        reason: >
            Die 1. Stufe (Tonika) erhält stets die Grundstellung, womit der Tonikadreiklang (I)
            gebildet wird. Der Tonikaton im Bass repräsentiert den Heimatakkord in seiner
            stabilsten Form.

    cadential_64:
        name: "Kadenzquartsextakkord (6/4)"
        source: "Heinichen [1728]; Christensen 2002, 72"
        reason: >
            Ein Quartsprung zur 4. Stufe deutet auf einen Kadenz-6/4-Akkord (zweite Umkehrung) hin.
            Nach Heinichen: „Die Akkorde 6/4 und 5/4 erscheinen am häufigsten in Kadenzen; sie
            sollten gespielt werden, auch wenn sie nicht ausdrücklich in den Bassziffern angegeben sind."

    subdominant_root:
        name: "Subdominante in Grundstellung (IV)"
        source: "Christensen 2002, 10"
        reason: >
            Die 4. Stufe erhält in den meisten Kontexten die Grundstellung, womit der
            Subdominantdreiklang (IV) gebildet wird. Ohne spezifisches Bewegungsmuster ist
            die Grundstellung die natürliche Harmonisierung.

    tritone_chord_iv:
        name: "Tritonusakkord auf IV (V⁴₂)"
        source: "Christensen 2002, 24"
        reason: >
            Die 4. Stufe, von einem absteigenden Schritt zur Mediante (III) gefolgt, erhält
            den Tritonusakkord (♯4), der sich zu ♯4/6/2 erweitert — dritte Umkehrung des
            Dominantseptakkords (V⁴₂). Nach Christensen §8: „Er wird üblicherweise auf der
            vierten Stufe gespielt, wenn sie von der Mediante (III) gefolgt wird."

    default_rule:
        name: "Standardregel (Grundstellung)"
        source: "Wead & Knopke, ICMC 2007"
        reason: >
            Keine spezifische Regel stimmte mit diesem Basston überein. Die Standard­
            harmonisierung ist die Grundstellung (5), die neutralste und stabilste Harmonisierung
            gemäß dem Rückfall des Wead–Knopke-Entscheidungsbaums.

# ── How It Works accordion ───────────────────────────────────────────────────
how_it_works:
    heading: "Funktionsweise"
    algo_heading: "Algorithmus-Übersicht"
    algo_intro: >
        Der Realisierer implementiert den Entscheidungsbaum nach Wead & Knopke (ICMC 2007)
        und stützt sich auf zwei barocke Haupttraktate:
    algo_gasparini: "L'Armonico Pratico al Cimbalo (3. Aufl., 1729, Venedig)"
    algo_delair: "Traité d'Accompagnement pour le Théorbe et le Clavecin (1724, Paris)"
    pipeline_heading: "Verarbeitungspipeline"
    step1: "Analyse — MusicXML wird eingelesen; die tiefste Stimme wird als Basslinie ausgewählt."
    step2: >
        Bezifferter-Bass-Erkennung — Sind <figured-bass>-Elemente vorhanden, werden sie
        direkt verwendet. Andernfalls läuft der Entscheidungsbaum für unbezifferten Bass.
    step3: "Entscheidungsbaum — Berechnet Stufe (1–7) und melodische Bewegung (Schritt/Sprung, auf/ab), wählt dann Ziffern nach Gasparini/Delair:"
    step3_a: "Stufe 7 (Leitton) → 6 (V⁶)"
    step3_b: "Stufen 2, 3 → 6 (erste Umkehrung)"
    step3_c: "Stufe 5 zur Tonika schrittweise → 7 (V⁷)"
    step3_d: "Aufsteigender Schritt auf Stufe 4 → 6 (Durchgang)"
    step3_e: "Alle anderen → 5 (Grundstellung)"
    step4: "Erweiterung der Ziffern — Abgekürzte Ziffern werden erweitert: 6→6, 7→7 5, 6 5→6 5, 4 3→4 3, 2→4 2."
    step5: "Stimmrealisation — Drei Oberstimmen (Sopran, Alt, Tenor) werden so gewählt, dass die gesamte Stimmführungsbewegung minimiert wird (Gesetz des kürzesten Weges), unter Einhaltung von:"
    step5_a: "Keine parallelen Quinten oder Oktaven"
    step5_b: "Kein Stimmkreuzen oder Verdoppeln des Leittons"
    step5_c: "Stimmlagen: Sopran c′–g″, Alt g–c″, Tenor c–e′"
    step6: "Export — Ausgabe als zweistimmiges MusicXML: Stimme 1 = Originalbass, Stimme 2 = Realisation (Oberstimmen 1–3 + Bass)."
    fb_heading: "Bezifferter-Bass-Notation: Referenz"
    fb_sec_triads: "Dreiklänge"
    fb_sec_sevenths: "Septakkorde"
    fb_sec_ninths: "Nonakkorde"
    fb_sec_suspensions: "Vorhalte"
    fb_sec_chromatic: "Chromatisch / Alteriert"
    fb_sec_special: "Besonderes"
    fb_none: "Grundstellung (Dreiklang)"
    fb_6: "Sextakkord (erste Umkehrung)"
    fb_64: "Quartsextakkord (zweite Umkehrung) — kadenziell oder Durchgang"
    fb_7: "Septakkord, Grundstellung"
    fb_65: "Septakkord, erste Umkehrung (V⁶₅-Variante)"
    fb_b5: "Verminderter-Quinten-Akkord = V⁶₅ (erste Umkehrung des Dominantseptakkords)"
    fb_43: "Septakkord, zweite Umkehrung / 4–3-Vorhalt"
    fb_2: "Septakkord, dritte Umkehrung"
    fb_sharp4: "Tritonusakkord = V⁴₂ (dritte Umkehrung des Dominantseptakkords)"
    fb_9: "Nonakkord / 9–8-Vorhalt"
    fb_97: "None mit Septime"
    fb_76: "7–6-Vorhalt"
    fb_54: "5–4-(–3-)Vorhalt"
    fb_sharp5: "Übermäßiger-Quinten-Akkord — 3, ♯5, 7, 9 (Christensen §14)"
    fb_b7: "Verminderter-Septimen-Akkord — 3, 5, ♭7 (Christensen §15)"
    fb_8: "Explizite Oktave über dem Bass"
    fb_acc: "Vorzeichen-Präfix — ♯ erhöht, ♭ erniedrigt, ♮ hebt die Zifferalteration auf"

